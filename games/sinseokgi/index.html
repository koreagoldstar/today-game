<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1410" />
    <title>고인돌</title>
    <base href="/games/sinseokgi/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-bgm="goindol">
    <div class="shell">
      <header class="top">
        <a class="back" href="/">← 오늘의 게임</a>
        <div class="titles">
          <h1>고인돌</h1>
          <p>Internet Archive에서 원작을 플레이해요</p>
        </div>
      </header>

      <section class="card">
        <p class="desc">
          이 사이트에서는 게임을 직접 제공하지 않습니다.<br />
          Internet Archive(보존용)로 이동해서 플레이하세요.
        </p>

        <div class="actions">
          <a
            class="btn"
            href="https://archive.org/details/msdos_Prehistorik_1991"
            target="_blank"
            rel="noopener noreferrer"
          >
            고인돌 1 플레이
          </a>
          <a
            class="btn btn-secondary"
            href="https://archive.org/details/msdos_Prehistorik_2_1993"
            target="_blank"
            rel="noopener noreferrer"
          >
            고인돌 2 플레이
          </a>
        </div>

        <div class="help">
          <h2>조작 (원작)</h2>
          <ul>
            <li><b>← →</b> 이동</li>
            <li><b>↑</b> 점프</li>
            <li><b>↓</b> 동굴 들어가기</li>
            <li><b>스페이스</b> 방망이 공격</li>
          </ul>
          <p class="note">Archive.org 페이지에서 시작 화면을 클릭한 뒤 키보드로 조작하세요.</p>
        </div>
      </section>
    </div>
      <script src="/js/bgm.js"></script>
  </body>
</html>
