<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#14101c" />
    <title>로드러너</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/classic-archive.css" />
  </head>
  <body data-bgm="lode-runner">
    <div class="shell">
      <header class="top">
        <a class="back" href="/">← 오늘의 게임</a>
        <div class="titles">
          <h1>로드러너</h1>
          <p>금을 모으고 함정을 파요</p>
        </div>
      </header>
      <section class="card">
        <img class="hero" src="/assets/thumbs/lode-runner.png" alt="" width="200" height="200" />
        <p class="desc">이 사이트에서는 게임을 직접 제공하지 않습니다.<br />Internet Archive(보존용)로 이동해서 플레이하세요.</p>
        <div class="actions">
          <a class="btn" href="https://archive.org/details/msdos_Lode_Runner_1983" target="_blank" rel="noopener noreferrer">로드러너 플레이</a>
          <a class="btn btn-secondary" href="https://archive.org/details/msdos_Lode_Runner_-_The_Legend_Returns_1994" target="_blank" rel="noopener noreferrer">Legend Returns</a>
        </div>
        <div class="help">
          <h2>조작 (원작)</h2>
          <ul>
            <li><b>← →</b> 이동</li>
            <li><b>↑ ↓</b> 사다리</li>
            <li><b>Z / X</b> 왼쪽·오른쪽 땅 파기</li>
            <li><b>금 전부</b> 탈출구 등장</li>
          </ul>
          <p class="note">Archive.org 페이지에서 화면을 클릭한 뒤 키보드로 조작하세요. 모바일은 화면 아래 가상 키가 뜰 수 있어요.</p>
        </div>
      </section>
    </div>
    <script src="/js/bgm.js"></script>
  </body>
</html>
