<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#6ec8f8" />
    <title>콩콩 점프</title>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-bgm="jump-run">
    <div class="stage">
      <canvas id="game" width="390" height="700"></canvas>

      <div class="hud">
        <div class="panel">
          <span>STAGE <b id="hud-stage">1</b></span>
          <span>점수 <b id="hud-score">0</b></span>
        </div>
        <div class="panel right">
          <span>거리 <b id="hud-dist">0</b></span>
          <span>최고 <b id="hud-best">0</b></span>
        </div>
      </div>
      <div class="goal-meter"><i id="goal-fill"></i></div>
      <div class="hint" id="hint">탭 · 스페이스 · ↑ 점프</div>

      <div class="overlay" id="title">
        <img class="hero-art" src="assets/hero.png" alt="" width="196" height="260" />
        <div class="badge">JUMP RUN</div>
        <h1>콩콩 점프</h1>
        <p>
          햇살 병아리와 하늘 캔디 플랫폼을 달려요!<br />
          무한 질주 · 난이도 상승 · 랭킹
        </p>
        <div class="icons">무한 질주 · 스프링 · 바람 · 새떼 · ★코인</div>
        <button type="button" class="btn" id="start-btn">시작!</button>
        <a href="/">← 오늘의 게임</a>
      </div>

      <div class="overlay hidden" id="over">
        <div class="badge">GAME OVER</div>
        <h1>앗, 떨어졌어요</h1>
        <p id="over-detail"></p>
        <form class="rank-form" id="rank-form">
          <label for="player-name">랭킹 이름 (2~8자)</label>
          <input id="player-name" name="name" maxlength="8" minlength="2" autocomplete="nickname" placeholder="닉네임" required />
          <button type="submit" class="btn" id="submit-btn">랭킹 등록</button>
          <p class="rank-msg" id="rank-msg"></p>
        </form>
        <button type="button" class="btn soft" id="share-rank-btn" hidden>내 결과 공유</button>
        <button type="button" class="btn soft" id="retry-btn">다시!</button>
        <a href="/">← 오늘의 게임</a>
      </div>
    </div>
    <script src="/js/bgm.js"></script>
    <script src="/js/scores.js"></script>
    <script src="/js/game-rank.js"></script>
    <script src="game.js"></script>
  </body>
</html>
