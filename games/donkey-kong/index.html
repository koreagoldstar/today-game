<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#14101c" />
    <title>동키콩</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/classic-archive.css" />
  </head>
  <body data-bgm="donkey-kong">
    <div class="shell">
      <header class="top">
        <a class="back" href="/">← 오늘의 게임</a>
        <div class="titles">
          <h1>동키콩</h1>
          <p>통을 피하며 꼭대기로</p>
        </div>
      </header>
      <section class="card">
        <img class="hero" src="/assets/thumbs/donkey-kong.png" alt="" width="200" height="200" />
        <p class="desc">이 사이트에서는 게임을 직접 제공하지 않습니다.<br />Internet Archive(보존용)로 이동해서 플레이하세요.</p>
        <div class="actions">
          <a class="btn" href="https://archive.org/details/a8b_Donkey_Kong_1983_Atari_US_a_k_file" target="_blank" rel="noopener noreferrer">동키콩 플레이</a>
          <a class="btn btn-secondary" href="https://archive.org/details/Donkey_Kong_1986_Ocean" target="_blank" rel="noopener noreferrer">C64 판</a>
        </div>
        <div class="help">
          <h2>플레이 방법</h2>
          <ul>
            <li><b>1</b> Archive 페이지에서 <b>검은 게임 화면을 클릭</b></li>
            <li><b>2</b> 로딩이 끝나면 키보드로 조작</li>
            <li><b>← →</b> 이동 · <b>↑ ↓</b> 사다리</li>
            <li><b>스페이스 / Ctrl</b> 점프 (기종에 따라 다름)</li>
          </ul>
          <p class="note">화면을 클릭하기 전에는 키가 안 먹습니다. 모바일은 화면 아래 가상 키를 써 보세요.</p>
        </div>
      </section>
    </div>
    <script src="/js/bgm.js"></script>
  </body>
</html>
