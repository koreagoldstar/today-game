<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffc1d8" />
    <title>상자야 굴러가</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-bgm="sokoban">
    <div class="app">
      <header class="top">
        <a class="home" href="/">← 홈</a>
        <div class="scores">
          <div class="score-box">STAGE <b id="hud-stage">1</b></div>
          <div class="score-box">푸시 <b id="hud-moves">0</b></div>
        </div>
      </header>

      <div class="board-wrap">
        <canvas id="game" width="390" height="390"></canvas>
      </div>

      <div class="pad">
        <button type="button" class="pad-btn" data-dir="up" aria-label="위">▲</button>
        <button type="button" class="pad-btn" data-dir="left" aria-label="왼쪽">◀</button>
        <button type="button" class="pad-btn" data-dir="down" aria-label="아래">▼</button>
        <button type="button" class="pad-btn" data-dir="right" aria-label="오른쪽">▶</button>
      </div>

      <div class="actions">
        <button type="button" class="act-btn" id="undo-btn">↩ 되돌리기</button>
        <button type="button" class="act-btn soft" id="restart-btn">↻ 다시</button>
      </div>
    </div>

    <div class="overlay" id="title">
      <img class="hero-art" src="assets/thumb.png" alt="" width="140" height="140" />
      <div class="badge">PUZZLE</div>
      <h1>상자야 굴러가</h1>
      <p>분홍 토끼가 상자를 목표까지 밀어요<br />50단계 · 뒤로 갈수록 빡세져요 · 되돌리기 OK</p>
      <div class="title-controls">
        <span>📱 방향패드 · 스와이프</span>
        <span>📱 스와이프 · 방향 버튼 &nbsp;|&nbsp; ⌨️ ←→↑↓ · 되돌리기 버튼</span>
      </div>
      <button type="button" class="btn" id="start-btn">시작!</button>
      <a href="/">← 홈</a>
    </div>

    <div class="overlay hidden" id="clear">
      <div class="badge soft">CLEAR</div>
      <h1>스테이지 클리어!</h1>
      <p id="clear-detail"></p>
      <button type="button" class="btn" id="next-btn">다음 스테이지</button>
    </div>

    <div class="overlay hidden" id="allclear">
      <div class="badge soft">ALL CLEAR</div>
      <h1>퍼즐 마스터!</h1>
      <p id="all-detail"></p>
      <button type="button" class="btn" id="again-btn">처음부터</button>
      <a href="/">← 홈</a>
    </div>

    <script src="/js/bgm.js"></script>
    <script src="/js/scores.js"></script>
    <script src="/js/game-rank.js"></script>
    <script src="/js/pause.js"></script>
    <script src="game.js"></script>
  </body>
</html>
