<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#7ec8ff" />
    <title>드리프트 삐약이</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-bgm="drift-chick">
    <div class="stage">
      <canvas id="game" width="390" height="700"></canvas>
      <div class="hud">
        <div class="panel">
          <span>거리 <b id="hud-dist">0</b>m</span>
          <span>콤보 <b id="hud-combo">0</b></span>
        </div>
        <div class="panel right">
          <span>점수 <b id="hud-score">0</b></span>
          <span>최고 <b id="hud-best">0</b></span>
        </div>
      </div>
      <p class="hint" id="hint">코너에선 반드시 드리프트!</p>

      <div class="overlay" id="title">
        <div class="badge">DRIFT</div>
        <img class="title-mascot" src="assets/player.png" alt="드리프트 삐약이" width="120" height="120" />
        <h1>드리프트 삐약이</h1>
        <p>직선은 자동, <b>코너에선 드리프트 필수!</b><br />꺾이는 쪽으로 눌러 미끄러지세요</p>
        <div class="title-controls">
          <span>왼쪽 터치 = 왼쪽 드리프트</span>
          <span>오른쪽 터치 = 오른쪽 드리프트</span>
          <span>연속 드리프트로 콤보·부스트!</span>
        </div>
        <button type="button" class="btn" id="start-btn">출발!</button>
        <a href="/">← 홈</a>
      </div>

      <div class="overlay hidden" id="over">
        <div class="badge">SPIN OUT</div>
        <h1>코스 아웃!</h1>
        <p id="over-detail"></p>
        <button type="button" class="btn" id="retry-btn">다시!</button>
        <a href="/">← 홈</a>
      </div>
    </div>
    <script src="/js/bgm.js"></script>
    <script src="/js/scores.js"></script>
    <script src="/js/game-rank.js"></script>
    <script src="/js/pause.js"></script>
    <script src="game.js"></script>
  </body>
</html>
