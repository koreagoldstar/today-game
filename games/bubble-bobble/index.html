<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#14101c" />
    <title>보글보글</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/classic-archive.css" />
  </head>
  <body data-bgm="bubble-bobble">
    <div class="shell">
      <header class="top">
        <a class="back" href="/">← 오늘의 게임</a>
        <div class="titles">
          <h1>보글보글</h1>
          <p>거품으로 잡아 터뜨려요</p>
        </div>
      </header>
      <section class="card">
        <img class="hero" src="/assets/thumbs/bubble-bobble.png" alt="" width="200" height="200" />
        <p class="desc">이 사이트에서는 게임을 직접 제공하지 않습니다.<br />Internet Archive Internet Arcade로 이동해서 플레이하세요.</p>
        <div class="actions">
          <a class="btn" href="https://archive.org/details/bublbobl" target="_blank" rel="noopener noreferrer">보글보글 플레이</a>
        </div>
        <div class="help">
          <h2>조작 (원작)</h2>
          <ul>
            <li><b>← →</b> 이동</li>
            <li><b>점프</b> 점프</li>
            <li><b>공격</b> 거품 발사</li>
            <li><b>2인</b> 동시 플레이 가능(원작)</li>
          </ul>
          <p class="note">Archive.org 페이지에서 화면을 클릭한 뒤 키보드로 조작하세요. 모바일은 화면 아래 가상 키가 뜰 수 있어요.</p>
        </div>
      </section>
    </div>
    <script src="/js/bgm.js"></script>
  </body>
</html>
