<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0c10" />
    <title>가위바위보</title>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&family=Orbitron:wght@600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-bgm="rps">
    <div class="stage">
      <canvas id="game" width="390" height="700"></canvas>
      <div class="hud">
        <div class="panel">
          <span>STAGE <b id="hud-stage">1</b></span>
          <span>연속 <b id="hud-streak">0</b></span>
        </div>
        <div class="panel right">
          <span>목표 <b id="hud-goal">3</b>승</span>
          <span>최고 <b id="hud-best">0</b></span>
        </div>
      </div>
      <div class="goal-meter"><i id="goal-fill"></i></div>

      <div class="pick-bar" id="pick-bar">
        <button type="button" class="pick" data-choice="scissors" aria-label="가위">
          <img class="pick-art" src="assets/scissors.png" alt="" />
          <span>가위</span>
        </button>
        <button type="button" class="pick" data-choice="rock" aria-label="바위">
          <img class="pick-art" src="assets/rock.png" alt="" />
          <span>바위</span>
        </button>
        <button type="button" class="pick" data-choice="paper" aria-label="보">
          <img class="pick-art" src="assets/paper.png" alt="" />
          <span>보</span>
        </button>
      </div>

      <div class="overlay" id="title">
        <img class="hero-art" src="assets/thumb.png" alt="" width="200" height="200" />
        <div class="badge">NEON CHROME</div>
        <h1>가위바위보</h1>
        <p>
          네온 크롬 핸드 배틀!<br />
          연속 승리로 스테이지를 클리어하세요
        </p>
        <div class="icons">ROCK · SCISSORS · PAPER</div>
        <button type="button" class="btn" id="start-btn">시작!</button>
        <a href="/">← 오늘의 게임</a>
      </div>

      <div class="overlay hidden" id="clear">
        <div class="badge soft">CLEAR</div>
        <h1>스테이지 클리어!</h1>
        <p id="clear-detail"></p>
        <button type="button" class="btn" id="next-btn">다음 스테이지</button>
      </div>

      <div class="overlay hidden" id="over">
        <div class="badge">GAME OVER</div>
        <h1>아쉬워요</h1>
        <p id="over-detail"></p>
        <button type="button" class="btn" id="retry-btn">다시!</button>
        <a href="/">← 오늘의 게임</a>
      </div>

      <div class="overlay hidden" id="allclear">
        <div class="badge soft">ALL CLEAR</div>
        <h1>RPS 레전드!</h1>
        <p id="all-detail"></p>
        <button type="button" class="btn" id="again-btn">처음부터</button>
        <a href="/">← 오늘의 게임</a>
      </div>
    </div>
    <script src="/js/bgm.js"></script>
    <script src="/js/scores.js"></script>
    <script src="/js/game-rank.js"></script>
    <script src="/js/pause.js"></script>
    <script src="game.js"></script>
  </body>
</html>
