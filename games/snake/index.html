<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#9fe0a8" />
    <title>애플 스네이크</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-bgm="snake">
    <div class="stage">
      <canvas id="game" width="390" height="700"></canvas>

      <div class="hud">
        <div class="panel">
          <span>STAGE <b id="hud-stage">1</b></span>
          <span>점수 <b id="hud-score">0</b></span>
        </div>
        <div class="panel right">
          <span>목표 <b id="hud-goal">8</b></span>
          <span>최고 <b id="hud-best">0</b></span>
        </div>
      </div>
      <div class="goal-meter"><i id="goal-fill"></i></div>
      <div class="lives-row" id="hud-lives"></div>

      <div class="overlay" id="title">
        <img class="hero-art" src="assets/thumb.png" alt="" width="160" height="160" />
        <div class="badge">MEADOW SNAKE</div>
        <h1>애플 스네이크</h1>
        <p>
          꽃밭에서 반짝 사과를 먹고 길어져요!<br />
          벽·몸에 닿으면 끝 · 황금 사과는 보너스
        </p>
        <div class="title-controls">
          <span>스와이프 또는 방향키로 조종</span>
          <span>연속 먹기 콤보로 점수 UP</span>
        </div>
        <button type="button" class="btn" id="start-btn">시작!</button>
        <button type="button" class="btn ghost" id="endless-btn">무한 모드</button>
        <a href="/">← 오늘의 게임</a>
      </div>

      <div class="overlay hidden" id="clear">
        <div class="badge soft">CLEAR</div>
        <h1>스테이지 클리어!</h1>
        <p id="clear-detail"></p>
        <button type="button" class="btn" id="next-btn">다음 스테이지</button>
      </div>

      <div class="overlay hidden" id="over">
        <div class="badge">GAME OVER</div>
        <h1>앗, 부딪혔어요</h1>
        <p id="over-detail"></p>
        <button type="button" class="btn" id="retry-btn">다시!</button>
        <a href="/">← 오늘의 게임</a>
      </div>

      <div class="overlay hidden" id="allclear">
        <div class="badge soft">ALL CLEAR</div>
        <h1>스네이크 마스터!</h1>
        <p id="all-detail"></p>
        <button type="button" class="btn" id="again-btn">처음부터</button>
        <a href="/">← 오늘의 게임</a>
      </div>
    </div>
    <script src="/js/bgm.js"></script>
    <script src="/js/scores.js"></script>
    <script src="/js/game-rank.js"></script>
    <script src="/js/pause.js"></script>
    <script src="game.js"></script>
  </body>
</html>
