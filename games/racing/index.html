<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#6ec8ff" />
    <title>스피드 삐약이</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-bgm="racing">
    <div class="stage">
      <canvas id="game" width="390" height="640"></canvas>
      <div class="hud">
        <div class="panel">
          <span>STAGE <b id="hud-stage">1</b></span>
          <span>거리 <b id="hud-dist">0</b>m</span>
        </div>
        <div class="panel right">
          <span>점수 <b id="hud-score">0</b></span>
          <span>최고 <b id="hud-best">0</b></span>
        </div>
      </div>

      <div class="controls">
        <button type="button" class="pad-btn" data-dir="left" aria-label="왼쪽">◀</button>
        <button type="button" class="pad-btn" data-dir="right" aria-label="오른쪽">▶</button>
      </div>

      <div class="overlay" id="title">
        <div class="badge">RACE</div>
        <img class="title-mascot" src="assets/player.png" alt="삐약이 차" />
        <h1>스피드 삐약이</h1>
        <p>3차선 도로를 질주하며<br />다른 차를 피해 멀리 달려요!</p>
        <div class="title-controls">
          <span>📱 좌우 스와이프 · ◀▶ 버튼</span>
          <span>⌨️ A/D · ← → 방향키</span>
        </div>
        <button type="button" class="btn" id="start-btn">출발!</button>
        <a href="/">← 홈</a>
      </div>

      <div class="overlay hidden" id="clear">
        <div class="badge soft">CLEAR</div>
        <h1>스테이지 클리어!</h1>
        <p id="clear-detail"></p>
        <button type="button" class="btn" id="next-btn">다음 스테이지</button>
      </div>

      <div class="overlay hidden" id="over">
        <div class="badge">CRASH</div>
        <h1>부딪혔어요!</h1>
        <p id="over-detail"></p>
        <button type="button" class="btn" id="retry-btn">다시!</button>
        <a href="/">← 홈</a>
      </div>

      <div class="overlay hidden" id="allclear">
        <div class="badge soft">ENDLESS</div>
        <h1>무한 질주!</h1>
        <p>50단계 클리어! 이제 끝없이 달려요</p>
        <button type="button" class="btn" id="endless-btn">계속!</button>
        <a href="/">← 홈</a>
      </div>
    </div>
    <script src="/js/bgm.js"></script>
    <script src="/js/scores.js"></script>
    <script src="/js/game-rank.js"></script>
    <script src="game.js"></script>
  </body>
</html>
