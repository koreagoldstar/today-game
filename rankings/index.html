<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7ec8ff" />
    <meta name="description" content="오늘의 게임 — 전체 게임 랭킹" />
    <title>전체 게임 랭킹 · 오늘의 게임</title>
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="오늘의 게임" />
    <meta property="og:title" content="전체 게임 랭킹 · 오늘의 게임" />
    <meta property="og:description" content="게임별 오늘 · 이번주 랭킹을 확인해요" />
    <meta property="og:url" content="https://www.todaygame.co.kr/rankings/" />
    <meta property="og:image" content="https://www.todaygame.co.kr/assets/og-share.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.todaygame.co.kr/assets/og-share.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body data-bgm="hub">
    <div class="sky" aria-hidden="true">
      <span class="blob blob-a"></span>
      <span class="blob blob-b"></span>
      <span class="blob blob-c"></span>
    </div>

    <main class="page rankings-page">
      <header class="rankings-hero">
        <a class="rankings-back" href="/">← 홈</a>
        <h1 class="rankings-title">전체 게임 랭킹</h1>
        <p class="rankings-desc">게임별 오늘 · 이번주 기록을 확인해요</p>
        <p class="hero-links" style="margin-top: 12px">
          <a class="hero-link hero-link-fame" href="/fame/">🏆 Hall of Fame</a>
        </p>
      </header>

      <div class="period-switch" role="tablist" aria-label="기간">
        <button type="button" class="period-btn on" role="tab" aria-selected="true" data-period="day">오늘</button>
        <button type="button" class="period-btn" role="tab" aria-selected="false" data-period="week">이번주</button>
      </div>

      <div class="score-tabs rankings-tabs" role="tablist" data-period="board" id="rankings-tabs"></div>

      <section class="rankings-board scoreboard" aria-label="랭킹 보드">
        <p class="score-note" id="rankings-note">오늘의 펄럭 병아리</p>
        <ol class="score-list" id="rankings-list">
          <li class="score-empty">불러오는 중…</li>
        </ol>
      </section>
    </main>

    <script src="/js/bgm.js"></script>
    <script src="/js/scores.js"></script>
    <script src="/js/rankable.js"></script>
    <script src="/js/rankings.js"></script>
  </body>
</html>
