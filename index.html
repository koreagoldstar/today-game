<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7ec8ff" />
    <meta name="description" content="오늘의 게임 — 작고 귀여운 게임들을 모아둔 플레이룸" />
    <title>오늘의 게임</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jua&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-bgm="hub">
    <div class="sky" aria-hidden="true">
      <span class="blob blob-a"></span>
      <span class="blob blob-b"></span>
      <span class="blob blob-c"></span>
      <div class="sparkles" id="sparkles"></div>
    </div>

    <main class="page hub-layout">
      <aside class="scoreboard" id="scoreboard" aria-label="랭킹">
        <div class="scoreboard-head">
          <h2 class="scoreboard-title">랭킹</h2>
          <div class="visit-inline" id="visit-chip" aria-live="polite">
            <span class="visit-label">오늘 방문</span>
            <strong class="visit-count" id="visit-count">…</strong>
          </div>
        </div>
        <div class="period-tabs" role="tablist" aria-label="랭킹 기간">
          <button type="button" class="period-tab on" role="tab" aria-selected="true" data-period="day">오늘</button>
          <button type="button" class="period-tab" role="tab" aria-selected="false" data-period="week">이번주</button>
        </div>
        <div class="score-tabs" role="tablist">
          <button type="button" class="score-tab on" role="tab" aria-selected="true" data-game="flappy">펄럭 병아리</button>
          <button type="button" class="score-tab" role="tab" aria-selected="false" data-game="doodle">폴짝 하늘</button>
          <button type="button" class="score-tab" role="tab" aria-selected="false" data-game="tetris">블록 팡팡</button>
          <button type="button" class="score-tab" role="tab" aria-selected="false" data-game="jump-run">콩콩 점프</button>
          <button type="button" class="score-tab" role="tab" aria-selected="false" data-game="ninja-dodge">닌자 표창</button>
        </div>
        <p class="score-note" id="score-note">오늘의 펄럭 병아리</p>
        <ol class="score-list" id="score-list">
          <li class="score-empty">불러오는 중…</li>
        </ol>
      </aside>

      <div class="hub-main">
        <header class="hero">
          <p class="date-chip" id="today-label">오늘</p>
          <h1 class="brand">오늘의 게임</h1>
          <p class="tagline">작고 귀여운 게임들을 모아둔 플레이룸</p>
        </header>

        <section class="shelf" aria-label="게임 목록">
          <h2 class="shelf-title">오늘 뭐하고 놀까</h2>
          <div class="catalog" id="catalog"></div>
        </section>

        <footer class="foot">
          <p>goldstar가 만들었어요</p>
        </footer>
      </div>
    </main>

    <script src="js/bgm.js"></script>
    <script src="js/scores.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
